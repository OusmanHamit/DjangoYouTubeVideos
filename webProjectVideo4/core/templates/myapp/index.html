{% extends "layouts/base.html" %}
{% load static %}
{% block navbar %} {% include "includes/navbar.html" %} {% endblock navbar %}
{% block content %} 
<div x-data="{ active: 0, slides: 2, interval: null, next() { this.active = (this.active + 1) % this.slides }, prev() { this.active = (this.active - 1 + this.slides) % this.slides }, go(i) { this.active = i }, start() { this.interval = setInterval(() => this.next(), 4000) }, stop() { clearInterval(this.interval) } }" x-init="start()" class="relative w-full">
    <!-- Carousel wrapper -->
    <div class="relative h-56 overflow-hidden rounded-base md:h-96">
        <!-- Item 1 -->
        <div x-show="active === 0" class="duration-700 ease-in-out" data-carousel-item>
            <img src="{% static 'img/dj+postgres.png' %}" class="absolute block w-full -translate-x-1/2 -translate-y-1/2 top-1/2 left-1/2" alt="...">
        </div>
        <!-- Item 2 -->
        <div x-show="active === 1" class="duration-700 ease-in-out" data-carousel-item>
            <img src="{% static 'img/dj+tailwind+github.png' %}" class="absolute block w-full -translate-x-1/2 -translate-y-1/2 top-1/2 left-1/2" alt="...">
        </div>
    </div>
    <!-- Slider indicators -->
    <div class="absolute z-30 flex -translate-x-1/2 bottom-5 left-1/2 space-x-3 rtl:space-x-reverse">
        <template x-for="i in slides" :key="i">
            <button type="button" :class="{'bg-white': active === i-1, 'bg-gray-400': active !== i-1 }" class="w-3 h-3 rounded-full" :aria-current="active === i-1 ? 'true' : 'false'" :aria-label="'Slide ' + i" @click="go(i-1)"></button>
        </template>
    </div>
    <!-- Slider controls -->
    <button type="button" class="absolute top-0 start-0 z-30 flex items-center justify-center h-full px-4 cursor-pointer group focus:outline-none" @click="prev">
        <span class="inline-flex items-center justify-center w-10 h-10 rounded-base bg-white/30 dark:bg-gray-800/30 group-hover:bg-white/50 dark:group-hover:bg-gray-800/60 group-focus:ring-4 group-focus:ring-white dark:group-focus:ring-gray-800/70 group-focus:outline-none">
            <svg class="w-5 h-5 text-white rtl:rotate-180" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m15 19-7-7 7-7"/></svg>
            <span class="sr-only">Previous</span>
        </span>
    </button>
    <button type="button" class="absolute top-0 end-0 z-30 flex items-center justify-center h-full px-4 cursor-pointer group focus:outline-none" @click="next">
        <span class="inline-flex items-center justify-center w-10 h-10 rounded-base bg-white/30 dark:bg-gray-800/30 group-hover:bg-white/50 dark:group-hover:bg-gray-800/60 group-focus:ring-4 group-focus:ring-white dark:group-focus:ring-gray-800/70 group-focus:outline-none">
            <svg class="w-5 h-5 text-white rtl:rotate-180" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m9 5 7 7-7 7"/></svg>
            <span class="sr-only">Next</span>
        </span>
    </button>
</div>

{% endblock content %}
{% block footer %}  {% include "includes/footer.html" %}  {% endblock footer %}
